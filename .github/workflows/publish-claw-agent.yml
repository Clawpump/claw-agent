name: Publish @clawpump/claw-agent to npm

# Publishes the npm installer (installer/) that bootstraps a full ClawPump
# Hermes install via `npx @clawpump/claw-agent`. `npm publish` runs the
# package's `prepack` (scripts/build-bundle.mjs), which bundles the agent fork
# into installer/agent at publish time — no extra build step needed here.
#
# Setup (once): add a repo secret NPM_TOKEN = an npm "Automation" (or granular,
# publish-scoped to @clawpump) access token. Then either publish a GitHub
# Release, or run this workflow manually (Actions → Run workflow) with an
# optional version bump.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump for installer/ (patch|minor|major|x.y.z). Leave blank to publish package.json as-is."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Bump version (manual runs only, if provided)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        working-directory: installer
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Publish to npm
        working-directory: installer
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
